name: Backend tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      INTERNAL_API_KEY: ci-internal-key
      S3_ENDPOINT_URL: https://storage.example
      S3_ACCESS_KEY_ID: ci-access
      S3_SECRET_ACCESS_KEY: ci-secret
      S3_BUCKET_NAME: ci-bucket
      DEPOSIT_CARD_NUMBER: "8600000000000000"
      DEPOSIT_CARD_HOLDER: CI TEST
      DEPOSIT_BANK_NAME: CI BANK
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: PYTHONPATH=backend pytest backend/tests -q
      - run: python -m compileall -q backend
